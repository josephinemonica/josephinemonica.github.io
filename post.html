<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Josephine Monica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/base.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<style>
  article {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 56px 24px 0;
  }
  .back {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    display: inline-block;
    margin-bottom: 40px;
  }
  .back:hover { color: var(--ink); }

  article .meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-bottom: 14px;
  }
  article h1.post-title {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 34px;
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin: 0 0 40px;
    text-wrap: balance;
  }

  /* Markdown body */
  .md {
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.7;
    color: var(--ink-soft);
  }
  .md p { margin: 0 0 22px; text-wrap: pretty; }
  .md h2 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 22px;
    line-height: 1.25;
    color: var(--ink);
    margin: 44px 0 14px;
    letter-spacing: -0.005em;
  }
  .md h3 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 19px;
    color: var(--ink);
    margin: 32px 0 12px;
  }
  .md a { color: var(--ink); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }
  .md a:hover { color: var(--accent); }
  .md ul, .md ol { padding-left: 1.3em; margin: 0 0 22px; }
  .md li { margin-bottom: 6px; }
  .md blockquote {
    margin: 24px 0;
    padding: 2px 0 2px 18px;
    border-left: 2px solid var(--rule);
    color: var(--muted);
    font-style: italic;
  }
  .md code {
    font-family: var(--mono);
    font-size: 0.88em;
    background: #00000008;
    padding: 1px 5px;
    border-radius: 3px;
  }
  .md pre {
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.55;
    background: #00000008;
    padding: 16px 18px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 0 0 22px;
  }
  .md pre code { background: transparent; padding: 0; font-size: 14px; }
  .md hr { border: 0; border-top: 1px solid var(--rule); margin: 40px 0; }
  .md img { max-width: 100%; height: auto; }

  .post-foot {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
  .post-foot a { color: var(--muted); text-decoration: none; }
  .post-foot a:hover { color: var(--ink); }

  .loading, .error {
    font-family: var(--serif);
    font-style: italic;
    color: var(--muted);
  }
</style>
</head>
<body data-screen-label="Blog Post">

<header class="site-nav">
  <a href="index.html" class="brand">Josephine Monica</a>
  <nav>
    <a href="index.html">About</a>
    <a href="resume.html">Resume</a>
    <!-- <a href="services.html">Services</a> -->
    <a href="blog.html" class="active">Blog</a>
  </nav>
</header>

<article>
  <a class="back" href="blog.html">← All posts</a>
  <div id="content"><p class="loading">Loading…</p></div>
  <div class="post-foot">
    <a href="blog.html">← All posts</a>
    <a href="index.html">Josephine Monica</a>
  </div>
</article>

<script>
  function parseFrontmatter(raw) {
    const m = raw.match(/^---\s*\n([\s\S]*?)\n---\s*\n?([\s\S]*)$/);
    if (!m) return { meta: {}, body: raw };
    const meta = {};
    for (const line of m[1].split("\n")) {
      const i = line.indexOf(":");
      if (i === -1) continue;
      const k = line.slice(0, i).trim();
      let v = line.slice(i + 1).trim();
      if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) {
        v = v.slice(1, -1);
      }
      meta[k] = v;
    }
    return { meta, body: m[2] };
  }

  function fmtDate(iso) {
    if (!iso) return "";
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
  }

  async function load() {
    const params = new URLSearchParams(location.search);
    const slug = params.get("slug");
    const root = document.getElementById("content");
    if (!slug) {
      root.innerHTML = '<p class="error">No post specified.</p>';
      return;
    }
    try {
      const res = await fetch(`posts/${slug}.md`);
      if (!res.ok) throw new Error(res.status);
      const raw = await res.text();
      const { meta, body } = parseFrontmatter(raw);
      const title = meta.title || slug;
      document.title = title + " — Josephine Monica";
      root.innerHTML = `
        <div class="meta">${fmtDate(meta.date)}</div>
        <h1 class="post-title">${title}</h1>
        <div class="md">${marked.parse(body)}</div>
      `;
    } catch (err) {
      console.error(err);
      root.innerHTML = '<p class="error">Could not load this post.</p>';
    }
  }
  load();
</script>
</body>
</html>
