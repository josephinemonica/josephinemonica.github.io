<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Blog — Josephine Monica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/base.css">
<style>
  .page {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 56px 24px 0;
  }
  .page h1 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 32px;
    letter-spacing: -0.01em;
    margin: 0 0 8px;
  }
  .page .sub {
    font-family: var(--serif);
    font-style: italic;
    color: var(--muted);
    font-size: 17px;
    margin: 0 0 32px;
  }

  .search {
    position: relative;
    margin-bottom: 4px;
  }
  .search input {
    width: 100%;
    box-sizing: border-box;
    font-family: var(--sans);
    font-size: 15px;
    color: var(--ink);
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--rule);
    padding: 10px 0 10px 26px;
    outline: none;
    transition: border-color .15s ease;
  }
  .search input::placeholder { color: var(--muted); }
  .search input:focus { border-bottom-color: var(--ink); }
  .search svg {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--muted);
    pointer-events: none;
  }
  .search-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
    padding: 10px 0 0;
    min-height: 18px;
  }

  .post-list { list-style: none; padding: 0; margin: 18px 0 0; }
  .post-list li a {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 20px;
    align-items: baseline;
    padding: 16px 0;
    border-bottom: 1px solid var(--rule);
    text-decoration: none;
    color: var(--ink);
  }
  .post-list li a:hover .title { color: var(--accent); }
  .post-list .title {
    font-family: var(--serif);
    font-size: 19px;
    line-height: 1.3;
    transition: color .15s ease;
  }
  .post-list .when {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .post-list mark {
    background: transparent;
    color: var(--accent);
    font-weight: 500;
  }

  .empty {
    color: var(--muted);
    font-family: var(--serif);
    font-style: italic;
    padding: 20px 0;
  }
</style>
</head>
<body data-screen-label="Blog Index">

<header class="site-nav">
  <a href="index.html" class="brand">Josephine Monica</a>
  <nav>
    <a href="index.html">About</a>
    <a href="resume.html">Resume</a>
    <!-- <a href="services.html">Services</a> -->
    <a href="blog.html" class="active">Blog</a>
  </nav>
</header>

<main class="page">
  <h1>Blog</h1>
  <p class="sub">Short, infrequent notes on robotics, industrial data, and the overlap.</p>

  <div class="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="11" cy="11" r="7"/>
      <path d="M20 20l-3.5-3.5"/>
    </svg>
    <input id="q" type="search" placeholder="Search posts…" autocomplete="off" spellcheck="false" />
  </div>
  <div class="search-meta" id="search-meta"></div>

  <div id="posts"><p class="empty">Loading…</p></div>
</main>

<footer class="site-footer">
  <span>© 2026 Josephine Monica</span>
  <span><a href="index.html" style="color:var(--muted);text-decoration:none;">← About</a></span>
</footer>

<script>
  function fmtDate(iso) {
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function highlight(text, query) {
    const safe = escapeHtml(text);
    if (!query) return safe;
    const q = query.trim();
    if (!q) return safe;
    const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
    return safe.replace(re, "<mark>$1</mark>");
  }

  let POSTS = [];

  function render(query = "") {
    const root = document.getElementById("posts");
    const meta = document.getElementById("search-meta");
    const q = query.trim().toLowerCase();
    const filtered = q
      ? POSTS.filter(p => p.title.toLowerCase().includes(q))
      : POSTS;

    meta.textContent = q
      ? `${filtered.length} ${filtered.length === 1 ? "match" : "matches"}`
      : "";

    if (!POSTS.length) {
      root.innerHTML = '<p class="empty">No posts yet.</p>';
      return;
    }
    if (!filtered.length) {
      root.innerHTML = '<p class="empty">No posts match “' + escapeHtml(query) + '”.</p>';
      return;
    }

    const ul = document.createElement("ul");
    ul.className = "post-list";
    for (const p of filtered) {
      const li = document.createElement("li");
      li.innerHTML = `
        <a href="post.html?slug=${encodeURIComponent(p.slug)}">
          <span class="title">${highlight(p.title, query)}</span>
          <span class="when">${fmtDate(p.date)}</span>
        </a>`;
      ul.appendChild(li);
    }
    root.innerHTML = "";
    root.appendChild(ul);
  }

  async function loadPosts() {
    const res = await fetch("posts/index.json");
    const posts = await res.json();
    posts.sort((a, b) => b.date.localeCompare(a.date));
    POSTS = posts;
    render();
  }

  document.getElementById("q").addEventListener("input", e => render(e.target.value));

  loadPosts().catch(err => {
    document.getElementById("posts").innerHTML =
      '<p class="empty">Could not load posts.</p>';
    console.error(err);
  });
</script>
</body>
</html>
